name: 'Update Assets'

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    name: Update assets

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          tools: composer

      - name: Compile Asset
        run: |
          composer install
          npm ci
          npm run prod

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update Assets (ci)
